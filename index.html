<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mon App Store</title>
</head>
<body>
  <h1>Mon Store</h1>
  <div id="container"></div>

  <script src="apps.js"></script>
  <script>
    const container = document.getElementById("container");

    apps.forEach(app => {
      const div = document.createElement("div");

      div.innerHTML = `
        <h2>${app.name}</h2>
        <img src="${app.image}" width="100">
        <p>${app.description}</p>
        <a href="${app.link}">Ouvrir</a>
      `;

      container.appendChild(div);
    });
  </script>
</body>
</html>
