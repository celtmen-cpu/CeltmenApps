<!DOCTYPE html>
<html lang="fr-FR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Celtmen Apps</title>


<link rel="stylesheet" href="style.css">


<style>


.details{

max-width:900px;

margin:auto;

padding:40px 25px;

}


.hero{

background:white;

border-radius:30px;

padding:30px;

display:flex;

gap:30px;

align-items:center;

}


.hero img{

width:150px;

height:150px;

border-radius:35px;

object-fit:cover;

}


.hero h1{

font-size:40px;

}


.button{

display:inline-block;

margin-top:20px;

background:#0071e3;

color:white;

padding:13px 30px;

border-radius:999px;

text-decoration:none;

font-weight:bold;

}



.section{

margin-top:30px;

background:white;

padding:30px;

border-radius:30px;

}


.screens{

display:flex;

gap:20px;

overflow-x:auto;

}


.screens img{

height:400px;

border-radius:25px;

}


.info-grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

}


.info-box{

background:#f5f5f7;

padding:20px;

border-radius:20px;

text-align:center;

}


@media(max-width:700px){

.hero{

flex-direction:column;

text-align:center;

}


.info-grid{

grid-template-columns:1fr;

}


.screens img{

height:300px;

}

}


</style>


</head>


<body>


<div class="details" id="app">


</div>



<script src="apps.js"></script>

<script src="app.js"></script>


</body>

</html>
